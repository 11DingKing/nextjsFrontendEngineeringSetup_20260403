version: '3.8'

services:
  frontend-user:
    build:
      context: ./frontend-user
      dockerfile: Dockerfile
    container_name: frontend-user
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
